{% extends 'base.html' %}
{% load static%}
{% block contenido %}

<p>¡Disfruta de los mejores cafés y postres!</p>
<div class="container-fluid mb-2 px-2 py-2">
    <!--Carrusel bootstrap-->
    <div id="carouselExampleInterval" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-inner">
            <div class="carousel-item active" data-bs-interval="200">
                <img src="{% static 'img/carr-01.jpg' %}" class="d-block w-50" alt="Cafes">
            </div>
            <div class="carousel-item">
                <img src="{% static 'img/carr-02.jpg' %}" class="d-block w-50" alt="Pasteles">
            </div>
            <div class="carousel-item">
                <img src="{% static 'img/carr-03.jpg' %}" class="d-block w-50" alt="Tortas">
            </div>
            <div class="carousel-item">
                <img src="{% static 'img/carr-04.jpg' %}" class="d-block w-50" alt="Promociones">
            </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleInterval"
            data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Anterior</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleInterval"
            data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Siguiente</span>
        </button>
    </div>
    <!--Fin Carrusel-->
</div>


{% endblock %}
