{% extends 'base.html' %}
{% load static %}
{% block contenido %}

<!--Formulario Contacto Bootstrap-->
<div class="row bg-info justify-content-center mb-2">
    <div class="col-12 col-md-6">
        <h1>Contacto</h1>
        <form method="post" class="form-control bg-secondary action=" /contacto_msg/">
            {% csrf_token %}
            <div class="mb-3">
                <label for="exampleFormControlInput1" class="form-label">Correo Electronico</label>
                <input name="nombre" type="email" class="form-control" id="exampleFormControlInput1"
                    placeholder="name@example.com">
            </div>
            <div class="mb-3">
                <label for="exampleFormControlTextarea1" class="form-label">Mensaje</label>
                <textarea name="mensaje" class="form-control" id="exampleFormControlTextarea1" rows="3"></textarea>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="checkbox" value="" id="flexCheckIndeterminate">
                <label class="form-check-label" for="flexCheckIndeterminate">
                    Acepta los términos y condiciones
                </label>
            </div>
            <div class="col-12">
                <button class="btn btn-primary" type="submit">Enviar información</button>
            </div>
        </form>
        <br>
        <!--Fin Formulario-->
    </div>
    <!--Mapa google ubicación-->
    <div class="col-12 col-md-6 text-center mb-2">
        <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d13378.03387005752!2d-71.63837999908992!3d-33.043077975088956!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x9689e14f56229ddd%3A0x2b0ef9d7ffb5ce0!2sCerro%20Alegre!5e0!3m2!1ses!2scl!4v1774816174800!5m2!1ses!2scl"
            width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"></iframe>
    </div>
    <!--Fin del mapa-->
</div>
{% endblock %}
